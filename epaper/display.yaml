esphome:
  name: display
  friendly_name: Display
  on_boot:
    priority: 300
    then:
      - delay: 2s
      - script.execute: manage_run_and_sleep

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "30"

logger:
  level: WARN

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Display Fallback Hotspot"
    password: !secret ap_password

http_request:
  verify_ssl: false
  timeout: 10s
  buffer_size_rx: 4096

spi:
  - id: spi_bus
    clk_pin: GPIO13
    mosi_pin: GPIO14

globals:
  - id: display_page
    type: int
    restore_value: true
    initial_value: '0'
  - id: initial_sensor_sync_pending
    type: bool
    restore_value: false
    initial_value: 'true'
  - id: night_skip_counter
    type: int
    restore_value: false
    initial_value: '0'

time:
  - platform: homeassistant
    id: ha_time

sensor:
  - platform: wifi_signal
    name: "Display WiFi Signal"
    id: sensor_wifi_signal
    update_interval: 60s
  - platform: uptime
    name: "Display Uptime"
    id: sensor_uptime
    update_interval: 60s
  - platform: homeassistant
    id: sensor_ladepreis_mittelwert
    entity_id: sensor.nl_ladepreis_aktuell
    internal: true
  - platform: homeassistant
    id: sensor_surplus_morgen
    entity_id: input_number.nl_surplus_morgen
    internal: true
  - platform: homeassistant
    id: sensor_surplus_uebermorgen
    entity_id: input_number.nl_surplus_uebermorgen
    internal: true
  - platform: homeassistant
    id: sensor_surplus_in3tagen
    entity_id: input_number.nl_surplus_in3tagen
    internal: true

image:
  - file: "/homeassistant/www/nachbarschaft-laden/logo_display.png"
    id: img_images_logo_png_400x200
    type: BINARY
    resize: 290x102
    dither: FLOYDSTEINBERG

online_image:
  - url: !secret epaper_display_image_url
    id: img_combined
    format: PNG
    type: BINARY
    update_interval: 300s
    on_error:
      - logger.log: "Fehler beim Laden des kombinierten Bildes – behalte letztes Bild"

qr_code:
  - id: qr_website
    value: !secret epaper_qr_url
    ecc: MEDIUM

font:
  - file: "fonts/DejaVuSans.ttf"
    id: font_roboto_400_20
    size: 20
    ignore_missing_glyphs: true
  - file: "fonts/DejaVuSans-Bold.ttf"
    id: font_dejavu_bold_22
    size: 22
    glyphs: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789 .,:-+/()ÄäÖöÜüß"
    ignore_missing_glyphs: true
  - file: "fonts/DejaVuSans-Bold.ttf"
    id: font_roboto_700_28
    size: 28
    ignore_missing_glyphs: true
  - file: "fonts/DejaVuSans-Bold.ttf"
    id: font_roboto_700_120
    size: 180
    ignore_missing_glyphs: true
  - file: "fonts/DejaVuSans.ttf"
    id: font_roboto_400_40
    size: 40
    ignore_missing_glyphs: true

button:
  - platform: template
    name: "Display Sofort-Refresh"
    id: btn_force_refresh
    on_press:
      - component.update: epaper_display

script:
  - id: manage_run_and_sleep
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return !(id(ha_time).now().is_valid() && api_is_connected());'
          then:
            - logger.log: "Waiting for sync..."
            - wait_until:
                condition:
                  lambda: 'return id(ha_time).now().is_valid() && api_is_connected();'
                timeout: 120s
            - logger.log: "Sync complete or timeout reached, continuing..."
      - if:
          condition:
            lambda: 'return id(initial_sensor_sync_pending);'
          then:
            - logger.log: "Waiting 5s for initial sensor updates..."
            - delay: 5s
            - lambda: 'id(initial_sensor_sync_pending) = false;'
      # Display aktualisiert sich selbst: partial alle 5s, full alle 60s (full_update_every: 12)

display:
  - platform: waveshare_epaper
    id: epaper_display
    cs_pin: GPIO15
    dc_pin: GPIO27
    busy_pin:
      number: GPIO25
      inverted: True
    reset_pin: GPIO26
    reset_duration: 2ms
    model: 7.50inV2p
    rotation: 90
    update_interval: 5s
    full_update_every: 120
    lambda: |-
      const auto COLOR_WHITE  = Color(0,   0,   0);
      const auto COLOR_BLACK  = Color(255, 255, 255);
      auto color_off = COLOR_WHITE;
      auto color_on  = COLOR_BLACK;

      // ── Nachtmodus: 22–6 Uhr nur alle 30 min rendern (360 × 5s) ──
      auto now_t = id(ha_time).now();
      if (now_t.is_valid()) {
        bool is_night = (now_t.hour >= 22 || now_t.hour < 6);
        if (is_night) {
          id(night_skip_counter) += 1;
          if (id(night_skip_counter) < 360) return;
          id(night_skip_counter) = 0;
        } else {
          id(night_skip_counter) = 0;
        }
      }

      int currentPage = id(display_page);

      if (currentPage == 0) {
        it.fill(COLOR_WHITE);

        // ── Aktueller Ladepreis (y=0–296) ──
        // ── Aktueller Ladepreis (y=0–267, 1. Drittel) ──
        // ── Sektion 1: Preis (y=0–267) – mehr Abstand Preis↔Einheit ──
        it.print(240, 5,   id(font_roboto_700_28),  color_on, TextAlign::TOP_CENTER, "Aktueller Ladepreis");
        {
          char buf[32];
          sprintf(buf, "%.1f", id(sensor_ladepreis_mittelwert).state);
          it.print(240, 30,  id(font_roboto_700_120), color_on, TextAlign::TOP_CENTER, buf);
          it.print(240, 217, id(font_roboto_400_40),  color_on, TextAlign::TOP_CENTER, "ct/kWh");
        }
        it.filled_rectangle(0, 267, 480, 2, COLOR_BLACK);

        // ── Sektion 2: PV-Überschuss (y=267–534) – 10px Lücken ──
        int cx0 = 80, cx1 = 240, cx2 = 400;

        it.print(240, 277, id(font_dejavu_bold_22), color_on, TextAlign::TOP_CENTER, "PV-Überschuss Prognose");

        it.print(cx0, 312, id(font_dejavu_bold_22), color_on, TextAlign::TOP_CENTER, "Morgen");
        it.print(cx1, 312, id(font_dejavu_bold_22), color_on, TextAlign::TOP_CENTER, "Übermorgen");
        it.print(cx2, 312, id(font_dejavu_bold_22), color_on, TextAlign::TOP_CENTER, "In 3 Tagen");

        // Smiley-Bild (460x136px) – zentriert auf 480px: x=10
        it.image(10, 347, id(img_combined), color_on, color_off);
        // Bild endet bei y=347+136=483

        // kWh-Werte unterhalb der Smileys
        float s_m = id(sensor_surplus_morgen).state;
        float s_u = id(sensor_surplus_uebermorgen).state;
        float s_3 = id(sensor_surplus_in3tagen).state;

        {
          char buf[16];
          sprintf(buf, "%+.0f kWh", s_m); it.print(cx0, 493, id(font_roboto_700_28), color_on, TextAlign::TOP_CENTER, buf);
          sprintf(buf, "%+.0f kWh", s_u); it.print(cx1, 493, id(font_roboto_700_28), color_on, TextAlign::TOP_CENTER, buf);
          sprintf(buf, "%+.0f kWh", s_3); it.print(cx2, 493, id(font_roboto_700_28), color_on, TextAlign::TOP_CENTER, buf);
        }
        it.filled_rectangle(0, 534, 480, 2, COLOR_BLACK);

        // ── Sektion 3: Footer (y=534–800) – 23px Lücken, Logo/QR unten bündig ──
        {
          auto now = id(ha_time).now();
          it.strftime(240, 557, id(font_roboto_700_28), color_on, TextAlign::TOP_CENTER, "%H:%M", now);
          it.strftime(240, 593, id(font_roboto_400_20), color_on, TextAlign::TOP_CENTER, "%d.%m.%Y", now);
        }
        // Logo links: x=0, y=675 (290×102px)
        it.image(0, 675, id(img_images_logo_png_400x200), color_off, color_on);
        // QR weiter rechts und höher: x=344, y=635 (~132px)
        it.qr_code(329, 635, id(qr_website), color_on, 4);
      }
