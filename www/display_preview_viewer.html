<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  img { width: 100%; display: block; }
</style>
</head>
<body>
<img id="img" src="" alt="">
<script>
  function refresh() {
    document.getElementById('img').src = 'display_preview.png?_=' + Date.now();
  }
  refresh();
  setInterval(refresh, 30000);
</script>
</body>
</html>
