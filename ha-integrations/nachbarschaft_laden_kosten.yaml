# Nachbarschaft-Laden – Echtzeit-Kostenerfassung
# Paket-Datei für /homeassistant/integrations/
#
# sensor.go_echarger_kosten_rate:     Template-Sensor, Kostenrate €/h
# sensor.go_echarger_kosten_integral: Riemann-Summe, per UI-Config-Entry angelegt
# sensor.go_echarger_kosten_session:  Utility-Meter – reset bei Sessionende

template:
  - sensor:
      - name: "go_echarger_kosten_rate"
        unique_id: "go_echarger_kosten_rate"
        unit_of_measurement: "€/h"
        state_class: measurement
        state: >
          {% set w = states('sensor.go_echarger_072750_nrg_12') | float(0) %}
          {% set ct = states('sensor.expgldurchschnitt_ema_asymalpha') | float(0) %}
          {{ ((w / 1000) * ct / 100) | round(6) }}

utility_meter:
  go_echarger_kosten_session:
    name: "go_echarger_kosten_session"
    source: sensor.go_echarger_kosten_integral
